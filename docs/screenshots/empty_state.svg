<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#020617"/>
  <rect x="0" y="0" width="1200" height="72" fill="#020617" stroke="#1e293b"/>
  <text x="40" y="43" fill="#f8fafc" font-family="system-ui" font-size="26" font-weight="700">TriageNet</text>
  <text x="890" y="42" fill="#cbd5e1" font-family="system-ui" font-size="15">Li $14/kg  Co $32/kg  Ni $18/kg</text>
  <rect x="40" y="104" width="330" height="190" rx="10" fill="#0f172a" stroke="#334155" stroke-dasharray="8 8"/>
  <text x="112" y="175" fill="#34d399" font-family="system-ui" font-size="52">⇧</text>
  <text x="92" y="225" fill="#e2e8f0" font-family="system-ui" font-size="18" font-weight="700">Drop cycle CSV or Parquet</text>
  <rect x="40" y="318" width="330" height="110" rx="10" fill="#0f172a" stroke="#1e293b"/>
